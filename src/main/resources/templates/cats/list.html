<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Katteliste</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header">
    <div class="container nav-container">
        <a href="/" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/">Forside</a></li>
                <li><a href="/members/list">Medlemmer</a></li>
                <li><a href="/cats/create">Opret kat</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="content container">
    <h1>Katte ejet af <span th:text="${member.name}"></span></h1>

    <p><a class="btn" th:href="@{/members/list}">Tilbage til medlemsliste</a></p>

    <table class="table" border="1">
        <thead>
        <tr>
            <th>Navn</th>
            <th>Race</th>
            <th>Køn</th>
            <th>Farve</th>
            <th>Fødselsdato</th>
            <th>Status</th>
            <th>Far</th>
            <th>Mor</th>
            <th>Opdrætter</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="cat : ${cats}">
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.breed}"></td>
            <td th:text="${cat.gender.description}"></td>
            <td th:text="${cat.color}"></td>
            <td th:text="${cat.dateOfBirth}"></td>
            <td th:text="${cat.status}"></td>
            <td th:text="${cat.father}"></td>
            <td th:text="${cat.mother}"></td>
            <td th:text="${cat.breeder}"></td>
        </tr>
        </tbody>
    </table>
</section>

</body>
</html>
