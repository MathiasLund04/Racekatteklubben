<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rediger kat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<section class="hero">
    <h1>Rediger kat</h1>
    <p>Opdater oplysningerne for katten her</p>
</section>

<section class="content container">

    <p><a class="btn" th:href="@{/cats/list}">Tilbage til katteoversigt</a></p>

    <h2>Rediger oplysninger</h2>

    <div class="cat-container">
    <div class="cat-info">
    <form th:action="@{/cats/update}" method="post" th:object="${cat}" enctype="multipart/form-data" class="form">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="name">Navn</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label for="owner">Ejer</label>
            <input type="text" id="owner" th:field="*{owner.email}" required>
        </div>

        <div class="form-group">
            <label for="breed">Race</label>
            <input type="text" id="breed" th:field="*{breed}" required>
        </div>

        <div class="form-group">
            <label for="gender">Køn</label>
            <select id="gender" th:field="*{gender}" required>
                <option value="">-- Vælg køn --</option>
                <option th:each="g : ${genders}"
                        th:value="${g}"
                        th:text="${g.description}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="dateOfBirth">Fødselsdato</label>
            <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}" required>
        </div>

        <div class="form-group">
            <label for="dead">Er katten død?</label>
            <input type="checkbox" id="dead" th:field="*{dead}" onchange="toggleDeathDate()">

            <label for="dateOfDeath">Dødsdato</label>
            <input type="date" id="dateOfDeath" th:field="*{dateOfDeath}">
        </div>

        <div class="form-group">
            <label for="father">Far</label>
            <input type="text" id="father" th:field="*{father}">
        </div>

        <div class="form-group">
            <label for="mother">Mor</label>
            <input type="text" id="mother" th:field="*{mother}">
        </div>

        <div class="form-group">
            <label for="breeder">Opdrætter</label>
            <input type="text" id="breeder" th:field="*{breeder}">
        </div>

        <div class="form-group">
            <label for="color">Farve</label>
            <input type="text" id="color" th:field="*{color}">
        </div>

        <div class="form-group">
            <label for="imageFile">Nyt billede</label>
            <input type="file" id="imageFile" name="imageFile">
        </div>

        <button class="btn" type="submit">Gem ændringer</button>
    </form>
    </div>

    <div class="cat-image">
        <img th:src="@{'/images/' + ${cat.image}}" alt="Billede af kat">
    </div>
    </div>
</section>

<script>
    function toggleDeathDate() {
        const checkbox = document.getElementById("dead");
        const dateInput = document.getElementById("dateOfDeath");
        dateInput.disabled = !checkbox.checked;
    }

    window.onload = toggleDeathDate;
</script>

</body>
</html>
