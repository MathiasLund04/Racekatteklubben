<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Slet kat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
<div th:replace="fragments/header :: header"></div>

<section class="hero">
    <h1>Slet kat</h1>
    <p>Bekræft venligst at du ønsker at slette katten</p>
</section>

<section class="content container">

    <h2>Er du sikker?</h2>

    <p>
        Vil du gerne slette katten:
        <strong th:text="${cat.name}"></strong>?
    </p>

    <div style="display:flex; gap:20px; margin-top:20px;">

        <!-- JA-knap -->
        <form th:action="@{/cats/delete/{id}(id=${cat.id})}" method="post">
            <button class="btn" style="background:#d9534f; color:white;">
                Ja, slet katten
            </button>
        </form>

        <!-- NEJ-knap -->
        <a class="btn" th:href="@{/members/home}">
            Nej, gå tilbage
        </a>

    </div>

</section>

</body>
</html>
