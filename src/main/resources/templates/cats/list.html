<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Katteliste</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header">
    <div class="container nav-container">
        <a href="/" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/">Forside</a></li>
                <li><a href="/members/list">Medlemmer</a></li>
                <li><a href="/cats/create">Opret kat</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Katte ejet af <span th:text="${member.name}"></span></h1>
    <p>Her kan du se alle katte registreret på medlemmet</p>
</section>

<section class="content container">

    <p><a class="btn" th:href="@{/members/list}">Tilbage til medlemsliste</a></p>

    <h2>Katteliste</h2>

    <div class="cat-card-container">
        <div class="cat-card" th:each="cat : ${cats}">
            <h3 th:text="${cat.name}"></h3>

            <p><strong>Race:</strong> <span th:text="${cat.breed}"></span></p>
            <p><strong>Køn:</strong> <span th:text="${cat.gender.description}"></span></p>
            <p><strong>Farve:</strong> <span th:text="${cat.color}"></span></p>
            <p><strong>Fødselsdato:</strong> <span th:text="${cat.dateOfBirth}"></span></p>
            <p><strong>Status:</strong> <span th:text="${cat.status}"></span></p>
            <p><strong>Far:</strong> <span th:text="${cat.father}"></span></p>
            <p><strong>Mor:</strong> <span th:text="${cat.mother}"></span></p>
            <p><strong>Opdrætter:</strong> <span th:text="${cat.breeder}"></span></p>

            <div class="cat-card-actions">
                <a th:href="@{/cats/catProfile/{id}(id=${cat.id})}" class="btn small">Se</a>
                <a th:href="@{/cats/update/{id}(id=${cat.id})}" class="btn small">Rediger</a>
                <a th:href="@{/cats/deleteConfirmation/{id}(id=${cat.id})}" class="btn small">Slet</a>
            </div>
        </div>
    </div>

</section>

</body>
</html>
