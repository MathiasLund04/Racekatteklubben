<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rediger bruger</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="header">
    <div class="container nav-container">
        <a href="/" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/members/home">Forside</a></li>
                <li><a href="/members/list">Medlemmer</a></li>
                <li><a href="/cats/list">Katte</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="content container">
    <h1>Rediger din bruger</h1>

    <form th:action="@{/members/update}" method="post" th:object="${loggedInMember}" class="form">

        <div class="form-group">
            <label for="name">Navn</label>
            <input type="text" id="name" th:field="*{name}">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" th:field="*{email}">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="changePassword" onchange="togglePasswordFields()">
                Skift password
            </label>
        </div>

        <div id="passwordFields" style="display:none;">

            <div class="form-group">
                <label for="currentPassword">Nuværende password</label>
                <div style="display:flex; align-items:center;">
                    <input type="password" id="currentPassword" th:field="*{password}">
                    <button type="button" onclick="togglePasswordVisibility('currentPassword')">
                        👁
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">Nyt password</label>
                <input type="password" id="newPassword" name="newPassword">
            </div>

        </div>

        <button class="btn" type="submit">Rediger</button>

        <p th:if="${error != null}" th:text="${error}" style="color:red; margin-top:10px;"></p>
    </form>


</section>

<script>
    function togglePasswordFields() {
        const checkbox = document.getElementById("changePassword");
        const fields = document.getElementById("passwordFields");

        fields.style.display = checkbox.checked ? "block" : "none";
    }

    function togglePasswordVisibility(id) {
        const input = document.getElementById(id);

        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }

    window.onload = togglePasswordFields;
</script>


</body>
</html>
