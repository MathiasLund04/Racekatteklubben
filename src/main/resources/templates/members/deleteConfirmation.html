<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Slet medlemskab</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header">
    <div class="container nav-container">
        <a href="/members/home" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/members/home">Forside</a></li>
                <li><a href="/members/list">Medlemmer</a></li>
                <li><a href="/cats/list">Katte</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Slet medlemskab</h1>
    <p>Bekræft venligst at du ønsker at slette dit medlemskab</p>
</section>

<section class="content container">

    <h2>Er du sikker?</h2>

    <p>
        Vil du gerne slette dit medlemskab,
        <strong th:text="${loggedInMember.name}"></strong>?
    </p>

    <div style="display:flex; gap:20px; margin-top:20px;">

        <!-- JA-knap: sender POST til /members/delete -->
        <form th:action="@{/members/delete}" method="post">
            <button class="btn" style="background:#d9534f; color:white;">
                Ja, slet mit medlemskab
            </button>
        </form>

        <!-- NEJ-knap: tilbage til home -->
        <a class="btn" th:href="@{/members/home}">
            Nej, gå tilbage
        </a>

    </div>

</section>

</body>
