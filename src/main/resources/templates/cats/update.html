<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rediger kat</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header">
    <div class="container nav-container">
        <a href="/" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/">Forside</a></li>
                <li><a href="/members/list">Medlemmer</a></li>
                <li><a href="/cats/list">Katte</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="content container">
    <h1>Rediger kat</h1>

    <form th:action="@{/cats/update}" method="post" th:object="${cat}" class="form">

        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="name">Navn</label>
            <input type="text" id="name" th:field="*{name}">
        </div>

        <div class="form-group">
            <label for="breed">Race</label>
            <input type="text" id="breed" th:field="*{breed}">
        </div>

        <div class="form-group">
            <label for="age">Alder</label>
            <input type="number" id="age" th:field="*{age}">
        </div>

        <div class="form-group">
            <label for="father">Far</label>
            <input type="text" id="father" th:field="*{father}">
        </div>

        <div class="form-group">
            <label for="mother">Mor</label>
            <input type="text" id="mother" th:field="*{mother}">
        </div>

        <div class="form-group">
            <label for="breeder">Opdrætter</label>
            <input type="text" id="breeder" th:field="*{breeder}">
        </div>

        <div class="form-group">
            <label for="emsCode">EMS‑kode</label>
            <input type="text" id="emsCode" th:field="*{emsCode}">
        </div>

        <button class="btn" type="submit">Gem ændringer</button>
    </form>
</section>

</body>
</html>
