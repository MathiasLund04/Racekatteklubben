<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header">
    <div class="container nav-container">
        <a href="/" class="logo">Racekatteklubben</a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger">
            <span></span><span></span><span></span>
        </label>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/">Forside</a></li>
                <li><a href="/members/register">Bliv medlem</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <h1>Login</h1>
    <p>Log ind for at administrere dine racekatte og medlemsoplysninger</p>
</section>

<section class="content container" style="text-align: center;">

    <div style="
        background-color: #fff;
        padding: 30px;
        border-radius: 10px;
        max-width: 450px;
        margin: 0 auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: left;
    ">
        <form th:action="@{/members/login}" method="post" class="form">

            <div class="form-group">
                <label>Email</label>
                <input type="text" name="email">
            </div>

            <div class="form-group">
                <label>Kode</label>
                <input type="password" name="password">
            </div>

            <button class="btn" type="submit">Login</button>

            <p th:if="${error != null}" th:text="${error}" style="color:red; margin-top:10px;"></p>
        </form>
    </div>

</section>

</body>
</html>
